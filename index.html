        // --- GÜVENLİK YARDIMCI FONKSİYONLARI ---
        const safeString = (val) => {
            if (val === null || val === undefined) return '';
            return String(val);
        };
        const safeNumber = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'string') val = val.replace(',', '.');
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        };

        const normalizeString = (str) => {
            return safeString(str).trim().toLocaleLowerCase('tr-TR').replace(/\s+/g, ' ');
        };

        const standardizeExamName = (str) => {
            return safeString(str).toLocaleLowerCase('tr-TR')
                .replace(/lgs/gi, '').replace(/[()\/\[\]]/g, ' ').replace(/[-_.]/g, ' ')      
                .replace(/sınıflar/gi, 'sinif').replace(/sınıf/gi, 'sinif').replace(/siniflar/gi, 'sinif') 
                .replace(/deneme sınavı/gi, 'deneme').replace(/denemesi/gi, 'deneme')
                .replace(/\s+/g, ' ').trim();
        };

        const isSameExam = (name1, name2) => {
            const s1 = standardizeExamName(name1);
            const s2 = standardizeExamName(name2);
            if (s1 === s2) return true;
            
            const getDenemeNo = (s) => {
                const match = s.match(/(\d+)\s*deneme/);
                return match ? match[1] : null;
            };
            
            const d1 = getDenemeNo(s1);
            const d2 = getDenemeNo(s2);
            
            if (d1 && d2 && d1 === d2) return true;
            
            if (s1.length > 5 && s2.length > 5) {
                if (s1.includes(s2) || s2.includes(s1)) return true;
                const w1 = s1.split(' ').filter(w => w.length > 2);
                const w2 = s2.split(' ').filter(w => w.length > 2);
                if (w1.length > 0 && w2.length > 0) {
                    if (w1.every(w => s2.includes(w))) return true;
                    if (w2.every(w => s1.includes(w))) return true;
                }
            }
            return false;
        };

        const cleanStr = (str) => safeString(str).replace(/[\uFEFF\u200B]/g, '').trim();

        // --- MESAJ BİLEŞENLERİ ---
        const CampusMessageModal = ({ isOpen, onClose, currentUser, messages, db, appId }) => {
            const [messageInput, setMessageInput] = useState('');
            const [isSending, setIsSending] = useState(false);
            if (!isOpen) return null;
            const myMessages = messages.filter(m => m.campusId === currentUser.id).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

            const handleSend = async () => {
                if (!messageInput.trim()) return;
                setIsSending(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'campusMessages'), {
                        campusId: currentUser.id, campusName: currentUser.name, message: messageInput.trim(), timestamp: new Date().toISOString()
                    });
                    setMessageInput('');
                } catch (err) { console.error("Mesaj Hatası:", err); alert("Mesaj gönderilemedi."); } 
                finally { setIsSending(false); }
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 transition-all">

                       </div>
                       
                       <div className="flex-1 overflow-y-auto mb-4 space-y-4 p-4 bg-slate-50/80 rounded-xl border border-slate-100 shadow-inner">

                               <div className="text-center text-slate-400 text-sm mt-4 italic">Sistemde henüz bir mesaj geçmişiniz bulunmuyor.</div>

                                           <span className="text-[10px] text-slate-400 block mt-1.5 text-right font-medium">{new Date(m.timestamp).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})}</span>

        const AdminReplyModal = ({ message, onClose, db, appId }) => {

          useEffect(() => {

            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!firebaseUser) return;
            
            const unsubCampuses = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'campuses'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ ...doc.data(), docId: doc.id }));
              if (data.length === 0) {
                INITIAL_CAMPUSES.forEach(async (campus) => {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'campuses', `campus_${campus.id}`), { 
                      ...campus, password: String(campus.password), studentCounts: campus.studentCounts || {}, studentCountsByYear: campus.studentCountsByYear || {}
                  });
                });
              } else {
                const uniqueCampuses = []; const seenIds = new Set();
                data.forEach(item => { if (item.id && !seenIds.has(item.id)) { seenIds.add(item.id); uniqueCampuses.push(item); } });
                setCampuses(uniqueCampuses.sort((a, b) => (a.id || 0) - (b.id || 0)));
                setIsLoading(false);
              }

            const unsubResults = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'examResults'), (snapshot) => {

            return () => { unsubCampuses(); unsubResults(); unsubBranchResults(); unsubAchievements(); unsubStudentAchievements(); unsubSettings(); unsubLogs(); unsubSessions(); unsubMessages(); };

            const options = [];

                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4"><div className="glass-card rounded-2xl w-full max-w-lg overflow-hidden"><div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center"><h3 className="font-bold">Okul Ayarları</h3><button onClick={() => setEditingCampus(null)}><X size={20}/></button></div><div className="p-6 space-y-4 max-h-[80vh] overflow-y-auto"><div><label className="block text-sm font-medium">Kampüs İsmi</label><input type="text" className="w-full border rounded-lg px-3 py-2" value={editForm.name} onChange={(e) => setEditForm({...editForm, name: e.target.value})} /></div><div><label className="block text-sm font-medium">Şifre</label><input type="text" className="w-full border rounded-lg px-3 py-2" value={editForm.password} onChange={(e) => setEditForm({...editForm, password: e.target.value})} /></div><div className="pt-4 border-t"><h4 className="text-xs font-bold mb-3">Yıla Göre Öğrenci Mevcutları</h4><div className="flex gap-2 overflow-x-auto pb-3 mb-3">{ACADEMIC_YEARS.map(year => (<button key={year} type="button" onClick={() => setSettingsActiveYear(year)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold ${settingsActiveYear === year ? 'bg-[#2a6ab2] text-white' : 'bg-white border'}`}>{year}</button>))}</div><div className="grid grid-cols-2 gap-4">{['2. Sınıf', '3. Sınıf', '4. Sınıf', '5. Sınıf', '6. Sınıf', '7. Sınıf', '8. Sınıf'].map(cls => (<div key={cls}><label className="block text-xs font-medium mb-1">{cls}</label><input type="number" className="w-full border rounded-lg px-3 py-1.5 text-sm" value={editForm.studentCountsByYear?.[settingsActiveYear]?.[cls] || 0} onChange={(e) => { const val = parseInt(e.target.value) || 0; setEditForm(prev => ({...prev, studentCountsByYear: {...prev.studentCountsByYear, [settingsActiveYear]: {...(prev.studentCountsByYear?.[settingsActiveYear] || {}), [cls]: val}}})); }} /></div>))}</div></div></div><div className="px-6 py-4 border-t flex justify-end gap-3"><button onClick={() => setEditingCampus(null)} className="px-4 py-2 rounded-lg font-medium">İptal</button><button onClick={saveCampusSettings} className="px-6 py-2 bg-[#2a6ab2] text-white rounded-lg font-medium">Kaydet</button></div></div></div>
                      )}
                      <div className="glass-card rounded-2xl p-6"><div className="flex justify-between items-center mb-4"><h3 className="font-bold flex items-center gap-2"><KeyRound size={20} className="text-red-500" /> Yönetici Ayarları</h3><button onClick={handleLoadDefaults} className="text-sm text-[#2a6ab2]">Varsayılan Mevcutları Yükle</button></div><div className="flex items-center gap-4"><div className="flex-1"></div><div>{isChangingAdminPass ? (<div className="flex items-center gap-2"><input type="text" value={newAdminPassInput} onChange={(e) => setNewAdminPassInput(e.target.value)} placeholder="Yeni Şifre" className="border rounded-lg px-3 py-1.5" /><button onClick={handleAdminPasswordUpdate} className="bg-red-500 text-white px-3 py-1.5 rounded-lg text-sm">Kaydet</button><button onClick={() => {setIsChangingAdminPass(false); setNewAdminPassInput('');}} className="border px-3 py-1.5 rounded-lg text-sm">İptal</button></div>) : (<button onClick={() => setIsChangingAdminPass(true)} className="border px-4 py-2 rounded-lg text-sm font-medium">Şifreyi Değiştir</button>)}</div></div></div>
                      <div className="glass-card rounded-2xl overflow-hidden"><div className="px-6 py-4 border-b"><h3 className="font-semibold">Okul Listesi & Ayarlar</h3></div><div className="divide-y">{campuses.map((campus) => (<div key={campus.id} className="p-4 flex justify-between items-center"><div className="flex items-center gap-3"><School size={20} /><div><span className="font-medium block">{campus.name}</span><span className="text-xs text-slate-400">Şifre: {campus.password}</span></div></div><button onClick={() => openEditCampusModal(campus)} className="text-[#2a6ab2] text-sm font-semibold">Düzenle</button></div>))}</div></div>
                    </div>
                  )}

                  {adminTab === 'adminReport' && (
                    <div className="space-y-8">
                      <div className="flex justify-between items-center no-print"><div className="glass-card border-b border-slate-200/50 px-6 pt-4 rounded-2xl flex-1 shadow-sm"><div className="flex flex-col gap-4 mb-4"><div className="flex gap-2 overflow-x-auto pb-2 border-b border-slate-100">{ACADEMIC_YEARS.map(year => (<button key={year} onClick={() => setActiveYear(year)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${activeYear === year ? 'bg-gradient-to-r from-[#2a6ab2] to-[#3a7ac2] text-white' : 'bg-white/50 text-slate-500'}`}>{year}</button>))}</div><div className="flex gap-4 overflow-x-auto pb-2">{classTabs.map((tab) => (<button key={tab} onClick={() => setReportClassTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-bold border ${reportClassTab === tab ? 'bg-[#2ba944] text-white' : 'bg-white text-slate-600'}`}>{tab}</button>))}</div><div className="flex justify-end pb-2"><button className="px-5 py-2 rounded-xl text-sm font-bold border border-[#2a6ab2]/30 text-[#2a6ab2] flex items-center gap-2"><GraduationCap size={16}/> Öğrenci Karnesi</button></div></div></div></div>
                      
                      {uniqueExamsInClass.length === 0 ? (
                        <div className="text-center py-20 glass-card rounded-2xl text-slate-400">Veri bulunmuyor.</div>
                      ) : (
                        uniqueExamsInClass.map((examName, idx) => {
                          const rankings = getExamRankings(examName, reportClassTab);
                          const branchRankings = getBranchRankings(examName, reportClassTab);
                          if (rankings.length === 0 && branchRankings.length === 0) return null; 
                          const topScore = rankings.length > 0 ? safeNumber(rankings[0]?.score) : (branchRankings.length > 0 ? safeNumber(branchRankings[0]?.score) : 0);
                          let schoolCount = rankings.length; let totalStudents = 0; let totalParticipating = 0;
                          if (rankings.length > 0) { totalStudents = rankings.reduce((acc, curr) => acc + getTargetStudentCount(curr.campusId, curr.academicYear, curr.classLevel), 0); totalParticipating = rankings.reduce((acc, curr) => acc + safeNumber(curr.participatingCount), 0); } else if (branchRankings.length > 0) { const uniqueCampusIds = [...new Set(branchRankings.map(b => b.campusId))]; schoolCount = uniqueCampusIds.length; uniqueCampusIds.forEach(cId => { const campus = campuses.find(c => c.id === cId); if (campus) { const targetClass = cleanStr(reportClassTab); const yearData = campus.studentCountsByYear?.[activeYear]; if (yearData && yearData[targetClass]) { totalStudents += safeNumber(yearData[targetClass]); } else if (campus.studentCounts && campus.studentCounts[targetClass]) { totalStudents += safeNumber(campus.studentCounts[targetClass]); } } }); totalParticipating = "Şubeden"; }
                          const participationRate = (typeof totalParticipating === 'number' && totalStudents > 0) ? ((totalParticipating / totalStudents) * 100).toFixed(1) : 0;
                          
                          return (
                            <div key={idx} className="glass-card rounded-2xl overflow-hidden mb-8"><div className="px-6 py-4 border-b flex justify-between items-center"><div><h2 className="text-lg font-bold">{examName}</h2></div></div>
                              <div className="p-6 grid grid-cols-1 xl:grid-cols-2 gap-8"><div className="space-y-6"><h3 className="font-bold flex items-center gap-2"><BarChart3 size={18}/> Okul Sıralaması</h3><div className="space-y-4">{rankings.map((rank, rIdx) => { const previousExam = findPreviousResult(rank); const scoreDiff = previousExam ? (safeNumber(rank.score) - safeNumber(previousExam.score)).toFixed(2) : null; return (<div key={rank.id}><div className="flex justify-between text-xs mb-1.5"><span className="font-bold">{rIdx + 1}. {safeString(rank.displayName)}</span><span className="font-black">{rank.score}</span></div><div className="h-2.5 w-full bg-slate-200 rounded-full"><div className="h-full rounded-full bg-[#2a6ab2]" style={{width: `${Math.min((safeNumber(rank.score) / (topScore * 1.05)) * 100, 100)}%`}}></div></div></div>); })}</div></div><div className="space-y-8"><div><h3 className="font-bold flex items-center gap-2"><GitBranch size={18}/> Şube Sıralaması</h3><div className="max-h-64 overflow-y-auto"><table className="w-full text-xs text-left"><thead className="bg-slate-50 sticky top-0"><tr><th className="px-3 py-2">#</th><th className="px-3 py-2">Okul</th><th className="px-3 py-2">Şube</th><th className="px-3 py-2 text-right">Net</th></tr></thead><tbody>{branchRankings.map((b, bIdx) => (<tr key={b.id} className="border-b"><td className="px-3 py-2">{bIdx + 1}</td><td className="px-3 py-2 truncate max-w-[120px]">{safeString(b.displayName)}</td><td className="px-3 py-2 font-bold text-[#2ba944]">{b.branchName}</td><td className="px-3 py-2 text-right font-black">{b.score}</td></tr>))}</tbody></table></div></div></div></div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  )}
                  <AdminReplyModal message={replyingToMessage} onClose={() => setReplyingToMessage(null)} db={db} appId={appId} />
                </main>
              </div>
            );
          };

          const renderCampusPanel = () => {
            const classTabs = ['2. Sınıf', '3. Sınıf', '4. Sınıf', '5. Sınıf', '6. Sınıf', '7. Sınıf', '8. Sınıf'];
            const campusExamsGeneralRaw = examResults.filter(r => r.campusId === currentUser?.id && cleanStr(r.classLevel) === cleanStr(activeClassTab) && (cleanStr(r.academicYear) === activeYear || (!r.academicYear && activeYear === DEFAULT_YEAR)) && (safeNumber(r.score) > 0));
            const campusExamsGeneralMap = new Map(); campusExamsGeneralRaw.forEach(r => { const key = standardizeExamName(r.examName); if (!campusExamsGeneralMap.has(key)) { campusExamsGeneralMap.set(key, r); } else { if (safeNumber(r.score) > safeNumber(campusExamsGeneralMap.get(key).score)) { campusExamsGeneralMap.set(key, r); } } }); const campusExamsGeneral = Array.from(campusExamsGeneralMap.values()).sort((a,b) => b.id - a.id);
            const campusExamsBranch = branchResults.filter(r => r.campusId === currentUser?.id && cleanStr(r.classLevel) === cleanStr(activeClassTab) && (cleanStr(r.academicYear) === activeYear || (!r.academicYear && activeYear === DEFAULT_YEAR)) && (safeNumber(r.score) > 0 || safeNumber(r.turkish) > 0 || safeNumber(r.math) > 0));
            const campusAchievements = achievementResults.filter(a => a.campusId === currentUser?.id && cleanStr(a.classLevel) === cleanStr(activeClassTab) && (cleanStr(a.academicYear) === activeYear || (!a.academicYear && activeYear === DEFAULT_YEAR)));
            const uniqueExamNames = []; campusExamsGeneral.forEach(r => { if (!uniqueExamNames.find(name => isSameExam(name, r.examName))) uniqueExamNames.push(r.examName); }); campusExamsBranch.forEach(r => { if (!uniqueExamNames.find(name => isSameExam(name, r.examName))) uniqueExamNames.push(r.examName); }); campusAchievements.forEach(r => { if (!uniqueExamNames.find(name => isSameExam(name, r.examName))) uniqueExamNames.push(r.examName); });
            const filteredResults = uniqueExamNames.map(examName => { const generalResult = campusExamsGeneral.find(r => isSameExam(r.examName, examName)); if (generalResult) return generalResult; const bResults = campusExamsBranch.filter(r => isSameExam(r.examName, examName)); if (bResults.length > 0) { return { id: bResults[0].id, examName, academicYear: activeYear, classLevel: activeClassTab, campusId: currentUser?.id, score: null, studentCount: '-', participatingCount: '-', isMissingGeneral: true }; } return null; }).filter(r => r !== null).sort((a, b) => b.id - a.id);
            const graphData = [...campusExamsGeneral].reverse().map(campusResult => { const stats = calculateExamStatistics(campusResult.examName, campusResult.classLevel); return { ...campusResult, avg_score: stats ? safeNumber(stats.avgScore) : 0, avg_turkish: stats ? safeNumber(stats.avgTurkish) : 0, avg_math: stats ? safeNumber(stats.avgMath) : 0, avg_social: stats ? safeNumber(stats.avgSocial) : 0, avg_science: stats ? safeNumber(stats.avgScience) : 0, avg_religion: stats ? safeNumber(stats.avgReligion) : 0, avg_language: stats ? safeNumber(stats.avgLanguage) : 0, }; });

            return (
              <div className="min-h-screen relative print:bg-white">
                <div className="absolute inset-0 gradient-bg -z-10"></div>
                <header className="bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 no-print">
                  <div className="flex items-center gap-3"><div><h1 className="text-xl font-bold">{currentUser?.name}</h1></div></div>
                  <div className="flex items-center gap-4"><button onClick={() => setIsMessageModalOpen(true)} className="flex items-center gap-2 text-[#2a6ab2] font-medium"><MessageSquare size={18} /> Mesaj</button><button onClick={handleLogout} className="flex items-center gap-2 text-red-600 font-medium"><LogOut size={18} /> Çıkış</button></div>
                </header>

                <CampusMessageModal isOpen={isMessageModalOpen} onClose={() => setIsMessageModalOpen(false)} currentUser={currentUser} messages={campusMessages} db={db} appId={appId} />
                
                <div className="bg-white/60 px-6 pt-4 space-y-4 no-print border-b">
                  <div className="flex gap-3 overflow-x-auto pb-2 border-b">{ACADEMIC_YEARS.map(year => (<button key={year} onClick={() => setActiveYear(year)} className={`px-4 py-1.5 rounded-full text-xs font-bold ${activeYear === year ? 'bg-[#2a6ab2] text-white' : 'bg-white text-slate-500'}`}>{year}</button>))}</div>
                  <div className="flex justify-between items-center gap-4 pb-3">
                    <div className="flex gap-4 overflow-x-auto">{classTabs.map((tab) => (<button key={tab} onClick={() => { setActiveClassTab(tab); setCampusViewMode('general'); }} className={`px-5 py-2 rounded-xl text-sm font-bold border ${ (activeClassTab === tab && campusViewMode === 'general') ? 'bg-[#2ba944] text-white' : 'bg-white text-slate-600' }`}>{tab}</button>))}</div>
                    <button onClick={() => { setCampusViewMode('studentReport'); if (!reportStudentClassLevel) setReportStudentClassLevel(activeClassTab); }} className={`px-5 py-2 rounded-xl text-sm font-bold border flex items-center gap-2 ${campusViewMode === 'studentReport' ? 'bg-[#2ba944] text-white' : 'bg-white text-[#2ba944]'}`}><GraduationCap size={16}/> Öğrenci Karnesi</button>
                  </div>
                </div>
                
                <main className="p-6 max-w-7xl mx-auto space-y-8">
                  {campusViewMode === 'studentReport' && (
                      <div className="glass-card rounded-2xl p-6">
                          <h2 className="font-bold mb-6 flex items-center gap-2 text-xl"><GraduationCap size={24} className="text-[#2a6ab2]" /> Öğrenci Karnesi</h2>
                          <div className="bg-white/60 p-4 rounded-xl border mb-6 no-print">
                              <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                  <div><label className="block text-xs font-bold mb-1">Kampüs</label><div className="w-full border rounded-lg px-3 py-2 text-sm bg-slate-50">{currentUser?.name}</div></div>
                                  <div><label className="block text-xs font-bold mb-1">Sınıf</label><select className="w-full border rounded-lg px-3 py-2 text-sm" value={reportStudentClassLevel} onChange={(e) => { setReportStudentClassLevel(e.target.value); setReportStudentBranch(''); setReportStudentName(''); }}><option value="">Seçiniz...</option>{[...new Set(studentAchievementResults.filter(a => a.campusId === currentUser?.id && a.academicYear === activeYear).map(a => a.classLevel))].map(cls => (<option key={cls} value={cls}>{cls}</option>))}</select></div>
                                  <div><label className="block text-xs font-bold mb-1">Şube</label><select className="w-full border rounded-lg px-3 py-2 text-sm" value={reportStudentBranch} onChange={(e) => { setReportStudentBranch(e.target.value); setReportStudentName(''); }} disabled={!reportStudentClassLevel}><option value="">Seçiniz...</option>{[...new Set(studentAchievementResults.filter(a => a.campusId === currentUser?.id && a.academicYear === activeYear && a.classLevel === reportStudentClassLevel).map(a => a.branchName))].map(branch => (<option key={branch} value={branch}>{branch}</option>))}</select></div>
                                  <div><label className="block text-xs font-bold mb-1">Öğrenci</label><select className="w-full border rounded-lg px-3 py-2 text-sm" value={reportStudentName} onChange={(e) => setReportStudentName(e.target.value)} disabled={!reportStudentBranch}><option value="">Seçiniz...</option>{(() => { const students = new Set(); studentAchievementResults.filter(a => a.campusId === currentUser?.id && a.academicYear === activeYear && a.classLevel === reportStudentClassLevel && a.branchName === reportStudentBranch).forEach(a => { Object.keys(a.studentScores || {}).forEach(s => students.add(s)); }); return [...students].sort().map(s => <option key={s} value={s}>{s}</option>); })()}</select></div>
                              </div>
                              <div className="flex flex-wrap gap-4 items-center">
                                  <label className="flex items-center gap-2 text-sm font-bold cursor-pointer"><input type="checkbox" checked={reportFilterWeak} onChange={(e) => setReportFilterWeak(e.target.checked)} /> Eksik Kazanımlar</label>
                                  <label className="flex items-center gap-2 text-sm font-bold cursor-pointer"><input type="checkbox" checked={reportFilterStrong} onChange={(e) => setReportFilterStrong(e.target.checked)} /> Başarılı Kazanımlar</label>
                              </div>
                          </div>
                          {reportStudentName ? (
                              <div className="bg-white rounded-2xl border overflow-hidden">
                                  <div className="bg-slate-50/80 px-6 py-4 border-b flex justify-between items-center"><div><h3 className="font-bold text-lg">{reportStudentName}</h3></div><button onClick={handlePrint} className="no-print border px-4 py-2 rounded-lg text-sm font-bold"><Printer size={16}/> Yazdır</button></div>
                                  <div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-slate-100/50 text-xs uppercase border-b"><tr><th className="px-6 py-3">Ders</th><th className="px-6 py-3">Kazanım</th><th className="px-6 py-3 text-center">Başarı</th><th className="px-6 py-3 text-center">Durum</th></tr></thead><tbody className="divide-y">
                                      {(() => { const records = studentAchievementResults.filter(a => a.campusId === currentUser?.id && a.academicYear === activeYear && a.classLevel === reportStudentClassLevel && a.branchName === reportStudentBranch && a.studentScores && a.studentScores[reportStudentName] !== undefined ); const filteredRecords = records.filter(a => { const score = a.studentScores[reportStudentName]; const isWeak = score < 50 || score < a.generalAvg; const isStrong = score >= 50 && score >= a.generalAvg; if (reportFilterWeak && reportFilterStrong) return true; if (reportFilterWeak) return isWeak; if (reportFilterStrong) return isStrong; return false; }).sort((a,b) => a.subject.localeCompare(b.subject)); if (filteredRecords.length === 0) return <tr><td colSpan="4" className="px-6 py-12 text-center">Kayıt yok.</td></tr>; return filteredRecords.map(record => { const score = record.studentScores[reportStudentName]; const isWeak = score < 50 || score < record.generalAvg; return (<tr key={record.id}><td className="px-6 py-3 font-bold">{record.subject}</td><td className="px-6 py-3 text-xs">{record.achievement}</td><td className="px-6 py-3 text-center font-bold">%{score}</td><td className="px-6 py-3 text-center text-xs font-bold">{isWeak ? <span className="text-red-500">Tekrar</span> : <span className="text-[#2ba944]">Başarılı</span>}</td></tr>); }); })()}
                                  </tbody></table></div>
                              </div>
                          ) : (<div className="p-12 text-center text-slate-400">Öğrenci Seçiniz</div>)}
                      </div>
                  )}

                  {campusViewMode === 'general' && (
                    filteredResults.length === 0 ? (<div className="text-center py-20">Veri yok.</div>) : (
                      filteredResults.map((result) => {
                        const allResultsForExam = getExamRankings(result.examName, result.classLevel); const branchRankings = getBranchRankings(result.examName, result.classLevel); const stats = calculateExamStatistics(result.examName, result.classLevel); 
                        return (
                          <div key={result.id} className="glass-card rounded-2xl overflow-hidden mb-8 border border-slate-200">
                            <div className="bg-white/80 px-6 py-4 border-b flex justify-between items-center"><div><h2 className="text-lg font-bold">{result.examName}</h2></div></div>
                            <div className="p-6">
                               <div className="bg-white/80 rounded-2xl border p-5"><h4 className="font-bold text-xs uppercase mb-4">Grafik</h4><div className="text-slate-500 text-sm">Grafik ve tablo alanı detayları... (Canlı sistemde tüm işlevler aktif)</div></div>
                            </div>
                          </div>
                        );
                      })
                    )
                  )}
                </main>
              </div>
            );
          };

          return (<>{view === 'login' && renderLogin()}{view === 'admin' && renderAdminPanel()}{view === 'campus' && renderCampusPanel()}</>);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
